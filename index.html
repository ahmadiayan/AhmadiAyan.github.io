<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmadi Ayan | Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #0f172a; color: #cbd5e1; line-height: 1.6; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 500px; width: 100%; background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); text-align: center; border: 1px solid #334155; }
        .profile-img { width: 100px; height: 100px; background: #38bdf8; border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; color: #0f172a; font-weight: bold; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        h1 { color: #f8fafc; font-size: 1.8rem; margin-bottom: 8px; }
        .subtitle { color: #38bdf8; font-weight: 600; font-size: 1rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        p { font-size: 0.95rem; color: #94a3b8; margin-bottom: 25px; }
        .section-title { font-size: 1.1rem; color: #f8fafc; margin-bottom: 12px; text-align: left; font-weight: 600; border-left: 3px solid #38bdf8; padding-left: 8px; }
        .skills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 30px; }
        .skill-badge { background: #334155; color: #e2e8f0; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; border: 1px solid #475569; }
        .btn { display: block; background: #38bdf8; color: #0f172a; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: all 0.3s ease; font-size: 1rem; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2); }
        .btn:hover { background: #0ea5e9; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <!-- প্রোফাইল পিকচারের জায়গায় আপনার নামের প্রথম অক্ষর থাকবে -->
        <div class="profile-img">A</div>
        
        <h1>AhmadiAyan</h1>
        <div class="subtitle">Tech Enthusiast</div>
        
        <p>স্বাগতম আমার ব্যক্তিগত ওয়েবসাইটে! আমি নতুন নতুন প্রযুক্তি নিয়ে কাজ করতে এবং শিখতে ভালোবাসি। এটি আমার অফিসিয়াল পোর্টফোলিও পেজ।</p>
        
        <div class="section-title">আমার স্কিলসমূহ</div>
        <div class="skills">
            <span class="skill-badge">Android Mods</span>
            <span class="skill-badge">Networking</span>
            <span class="skill-badge">WordPress</span>
            <span class="skill-badge">GitHub</span>
        </div>
        
        <a href="https://github.com/AhmadiAyan" class="btn" target="_blank">আমার GitHub প্রোফাইল</a>
    </div>

</body>
</html>
